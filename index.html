<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Project: Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="player-container">
    <header class="song-info">
        <h2 id="title">Select a Song</h2>
        <h3 id="artist">Local Audio Player</h3>
    </header>

    <div class="progress-container" id="progress-container">
        <div class="progress" id="progress"></div>
    </div>

    <div class="controls">
        <button id="prev" class="action-btn">Prev</button>
        <button id="play" class="action-btn main-btn">Play</button>
        <button id="next" class="action-btn">Next</button>
    </div>

    <div class="volume-section">
        <label for="volume-slider">Vol</label>
        <input type="range" id="volume-slider" min="0" max="100" value="80">
    </div>

    <audio id="audio" src=""></audio>
</main>

<script src="script.js"></script>
</body>
</html>
